name: Sync upstream

on:
  workflow_dispatch:
    inputs:
      force_failure:
        description: "Test failure path: create a disposable sync PR and Pi comment"
        type: boolean
        default: false
        required: false
  schedule:
    # Every 6 hours. GitHub schedules run in UTC.
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

env:
  BRANCH_NAME: main
  UPSTREAM_REPO: ai-that-works/ai-that-works
  UPSTREAM_BRANCH: main
  SYNC_PR_BRANCH: sync/upstream-main
  TEST_SYNC_PR_BRANCH: sync/upstream-main-test
  FORCE_FAILURE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_failure }}
  HAS_LLM_PROXY_API_KEY: ${{ secrets.LLM_PROXY_API_KEY != '' }}
  HAS_TAILSCALE_OAUTH: ${{ secrets.AI_THAT_WORKS_TS_OAUTH_CLIENT_ID != '' && secrets.AI_THAT_WORKS_TS_OAUTH_SECRET != '' }}

jobs:
  sync:
    name: Merge upstream/main into fork main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream
        run: |
          set -uo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          git checkout "${BRANCH_NAME}"

          if [ "${FORCE_FAILURE}" = "true" ]; then
            {
              echo "Simulated upstream sync failure for workflow validation."
              echo "This was triggered with workflow_dispatch input force_failure=true."
              echo "No real upstream merge was attempted after this point."
            } > merge-output.txt
            cat merge-output.txt
            echo "::error::Simulated upstream sync failure. A test sync PR will be opened or updated."
            exit 1
          fi

          set +e
          git merge "upstream/${UPSTREAM_BRANCH}" --no-edit > merge-output.txt 2>&1
          merge_rc=$?
          set -e

          cat merge-output.txt

          if [ "$merge_rc" -ne 0 ]; then
            echo "::error::Merge conflict or merge failure while syncing upstream/${UPSTREAM_BRANCH} into ${BRANCH_NAME}. A sync PR will be opened or updated."
            exit "$merge_rc"
          fi

      - name: Push synced main
        run: |
          set -uo pipefail

          set +e
          git push origin "HEAD:${BRANCH_NAME}" > push-output.txt 2>&1
          push_rc=$?
          set -e

          cat push-output.txt
          exit "$push_rc"

      - name: Capture failure context
        if: failure()
        run: |
          set -euo pipefail

          git status --short > git-status.txt || true
          git diff --name-only --diff-filter=U > conflict-files.txt || true
          git diff --cc > conflict-diff.txt || true

          {
            echo "# Failed upstream sync context"
            echo
            echo "- Fork branch: ${BRANCH_NAME}"
            echo "- Upstream branch: upstream/${UPSTREAM_BRANCH}"
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "## Merge output"
            echo '```text'
            if [ -s merge-output.txt ]; then cat merge-output.txt; else echo "No merge output captured."; fi
            echo '```'
            echo
            echo "## Git status"
            echo '```text'
            if [ -s git-status.txt ]; then cat git-status.txt; else echo "No git status captured."; fi
            echo '```'
            echo
            echo "## Conflicted files"
            if [ -s conflict-files.txt ]; then
              sed 's/^/- `/' conflict-files.txt | sed 's/$/`/'
            else
              echo "No unmerged files detected. This may be a push or workflow failure rather than a merge conflict."
            fi
            echo
            echo "## Combined conflict diff"
            echo '```diff'
            if [ -s conflict-diff.txt ]; then head -c 40000 conflict-diff.txt; else echo "No combined conflict diff captured."; fi
            echo
            echo '```'
          } > sync-failure-context.md

      - name: Connect runner to Tailnet for LLM proxy
        if: failure() && env.HAS_LLM_PROXY_API_KEY == 'true' && env.HAS_TAILSCALE_OAUTH == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.AI_THAT_WORKS_TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.AI_THAT_WORKS_TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Install Node for Pi
        if: failure() && env.HAS_LLM_PROXY_API_KEY == 'true' && env.HAS_TAILSCALE_OAUTH == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ask Pi via LLM proxy for recommended fix
        if: failure() && env.HAS_LLM_PROXY_API_KEY == 'true' && env.HAS_TAILSCALE_OAUTH == 'true'
        continue-on-error: true
        env:
          LLM_PROXY_API_KEY: ${{ secrets.LLM_PROXY_API_KEY }}
          PI_MODEL: ${{ vars.PI_MODEL || 'gpt-5.5' }}
          PI_CODING_AGENT_DIR: ${{ github.workspace }}/.pi-agent
          PI_SKIP_VERSION_CHECK: "1"
          PI_TELEMETRY: "0"
        run: |
          set -euo pipefail

          npm install -g --ignore-scripts @earendil-works/pi-coding-agent

          mkdir -p "${PI_CODING_AGENT_DIR}"
          cat > "${PI_CODING_AGENT_DIR}/models.json" <<'EOF'
          {
            "providers": {
              "llm-proxy": {
                "baseUrl": "http://100.72.69.60:8000/v1",
                "api": "openai-completions",
                "apiKey": "$LLM_PROXY_API_KEY",
                "authHeader": true,
                "compat": {
                  "supportsStore": false,
                  "supportsDeveloperRole": false,
                  "supportsReasoningEffort": false,
                  "supportsUsageInStreaming": false,
                  "maxTokensField": "max_tokens"
                },
                "models": [
                  {
                    "id": "gpt-4.1",
                    "name": "GPT-4.1 via LLM proxy",
                    "input": ["text"],
                    "contextWindow": 1047576,
                    "maxTokens": 32768
                  },
                  {
                    "id": "gpt-4o",
                    "name": "GPT-4o via LLM proxy",
                    "input": ["text"],
                    "contextWindow": 128000,
                    "maxTokens": 16384
                  },
                  {
                    "id": "gpt-5.5",
                    "name": "GPT-5.5 via LLM proxy",
                    "input": ["text"],
                    "contextWindow": 400000,
                    "maxTokens": 32768
                  }
                ]
              }
            }
          }
          EOF

          cat > pi-prompt.md <<'EOF'
          You are Pi running in GitHub Actions after an automated fork sync failed.

          Goal: write a concise Markdown PR comment with a recommended human fix. Do not edit files, do not commit, and do not push.

          Context:
          - The workflow tried to merge upstream/main into main.
          - The current working tree may contain Git conflict markers from the failed merge.
          - Use read-only inspection only.

          Output exactly these sections:
          1. Summary
          2. Likely cause
          3. Recommended resolution by file
          4. Local commands to fix
          5. What to test/check after resolving

          Be specific. If the captured information is insufficient, say what is missing and give the safest manual next step.
          EOF

          cat sync-failure-context.md >> pi-prompt.md

          set +e
          pi \
            --print \
            --no-session \
            --no-context-files \
            --no-skills \
            --no-extensions \
            --no-prompt-templates \
            --no-themes \
            --no-approve \
            --no-tools \
            --provider llm-proxy \
            --model "${PI_MODEL}" \
            --thinking off \
            "$(cat pi-prompt.md)" > pi-recommendation.md 2> pi-error.txt
          pi_rc=$?
          set -e

          if [ "$pi_rc" -ne 0 ] || [ ! -s pi-recommendation.md ]; then
            {
              echo "_Pi did not produce a recommendation._"
              echo
              echo "Pi exit code: \`${pi_rc}\`"
              echo
              echo "### Pi stderr"
              echo
              echo '```text'
              if [ -s pi-error.txt ]; then cat pi-error.txt; else echo "No stderr captured."; fi
              echo '```'
            } > pi-recommendation.md
          fi

      - name: Open or update sync PR and comment
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.SYNC_BOT_GITHUB_TOKEN || github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ ! -s pi-recommendation.md ]; then
            cat > pi-recommendation.md <<'EOF'
          _Pi did not produce a recommendation. Make sure `LLM_PROXY_API_KEY`, `AI_THAT_WORKS_TS_OAUTH_CLIENT_ID`, and `AI_THAT_WORKS_TS_OAUTH_SECRET` repository secrets are configured, the Tailnet ACL allows `tag:github-actions`, and the LLM proxy is reachable at `100.72.69.60:8000`; then rerun the workflow._
          EOF
          fi

          # Leave the conflicted merge state before creating/updating the PR branch.
          git merge --abort 2>/dev/null || true
          git reset --hard

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          if [ "${FORCE_FAILURE}" = "true" ]; then
            pr_branch="${TEST_SYNC_PR_BRANCH}"
            pr_title="Test upstream sync failure handling"
            pr_body="This disposable PR was created by a manual force_failure=true workflow run to validate the upstream sync failure path and Pi recommendation comment. Do not merge."

            git checkout -B "${pr_branch}" "origin/${BRANCH_NAME}"
            mkdir -p .github
            {
              echo "# Upstream sync failure-path test"
              echo
              echo "Workflow run: ${RUN_URL}"
              echo "Created at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              echo
              echo "This file exists only to make the test PR non-empty. Do not merge."
            } > .github/upstream-sync-failure-test.md
            git add .github/upstream-sync-failure-test.md
            git commit -m "Test upstream sync failure handling"
            git push origin "${pr_branch}:${pr_branch}" --force
          else
            pr_branch="${SYNC_PR_BRANCH}"
            pr_title="Sync upstream/${UPSTREAM_BRANCH} into ${BRANCH_NAME}"
            pr_body="Automated upstream sync failed while directly merging upstream/${UPSTREAM_BRANCH} into ${BRANCH_NAME}. This PR mirrors upstream/${UPSTREAM_BRANCH}; use it to inspect and resolve the conflict."

            # The PR branch mirrors upstream/main. If it conflicts with main, GitHub will show that on the PR.
            git branch -f "${pr_branch}" "upstream/${UPSTREAM_BRANCH}"
            git push origin "${pr_branch}:${pr_branch}" --force
          fi

          pr_number="$(gh api "repos/${{ github.repository }}/pulls?state=open&base=${BRANCH_NAME}" \
            --jq ".[] | select(.head.ref == \"${pr_branch}\") | .number" \
            | head -n 1 || true)"

          if [ -z "${pr_number}" ]; then
            pr_url="$(gh pr create \
              --base "${BRANCH_NAME}" \
              --head "${pr_branch}" \
              --title "${pr_title}" \
              --body "${pr_body}")"
            pr_number="${pr_url##*/}"
          fi

          append_file() {
            local heading="$1"
            local file="$2"
            echo "### ${heading}"
            echo
            if [ -s "$file" ]; then
              echo '```text'
              head -c 12000 "$file"
              if [ "$(wc -c < "$file")" -gt 12000 ]; then
                echo
                echo "... output truncated; see the workflow run for full logs ..."
              fi
              echo
              echo '```'
            else
              echo "_No ${heading} captured._"
            fi
            echo
          }

          {
            echo "<!-- upstream-sync-pi-recommendation -->"
            echo "## Upstream sync failed"
            echo
            echo "The scheduled fork sync could not merge \`upstream/${UPSTREAM_BRANCH}\` into \`${BRANCH_NAME}\`."
            echo
            echo "- Workflow run: ${RUN_URL}"
            echo "- Fork branch: \`${BRANCH_NAME}\`"
            echo "- Upstream branch: \`upstream/${UPSTREAM_BRANCH}\`"
            echo "- Sync PR branch: \`${pr_branch}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Force failure test: \`${FORCE_FAILURE}\`"
            echo
            echo "## Pi recommendation"
            echo
            cat pi-recommendation.md
            echo
            echo "## Captured workflow output"
            echo
            append_file "git merge output" merge-output.txt
            append_file "git push output" push-output.txt
            append_file "git status" git-status.txt
            append_file "Pi stderr" pi-error.txt
          } > pr-comment.md

          comment_id="$(gh api "repos/${{ github.repository }}/issues/${pr_number}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- upstream-sync-pi-recommendation -->"))) | .id' \
            | tail -n 1 || true)"

          if [ -n "${comment_id}" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${comment_id}" \
              --field body="$(cat pr-comment.md)" >/dev/null
            echo "Updated Pi recommendation comment on PR #${pr_number}"
          else
            gh api \
              --method POST \
              "repos/${{ github.repository }}/issues/${pr_number}/comments" \
              --field body="$(cat pr-comment.md)" >/dev/null
            echo "Created Pi recommendation comment on PR #${pr_number}"
          fi
