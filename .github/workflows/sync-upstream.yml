name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours. GitHub schedules run in UTC.
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream/main into fork main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/ai-that-works/ai-that-works.git
          git fetch upstream main

          git checkout main
          git merge upstream/main --no-edit || {
            echo "::error::Merge conflict while syncing upstream/main into main. Resolve the conflict manually, commit it, and push to origin/main."
            git status --short
            exit 1
          }

      - name: Push synced main
        run: git push origin HEAD:main
